name: horror_short_drama
content_type: short_drama
description: "1-10min 短剧，静态图 + Ken Burns + TTS"
stages: [prompt_expand, image_generate, tts_synthesize, ken_burns, assemble, sfx, subtitle]

defaults:
  scene_count: 16
  style_preset: "水墨悬疑"
  flux_steps: 8
  flux_width: 1024
  flux_height: 1024
  flux_guidance: 4.0
  flux_scheduler: "flow_match_euler_discrete"
  flux_steps_auto: true
  ken_burns_preset: "random"
  ken_burns_width: 1080
  ken_burns_height: 1920
  ken_burns_fps: 30
  ken_burns_workers: 2
  ken_burns_audio_cut: true
  ken_burns_silence_noise_db: -30
  ken_burns_silence_min_dur: 0.3
  ken_burns_max_shots: 4
  ken_burns_audio_cut_min_dur: 3.0
  assemble_transition: "fade"
  assemble_duck_bgm: true
  sfx_map: {}
  subtitle_mode: "auto"
  subtitle_font: "Arial Unicode"
  subtitle_font_size: 20
  subtitle_margin_v: 60
  tts_instructions: "低沉、压抑、略带颤抖的中式恐怖旁白语气；语速偏慢，停顿处留白以制造悬念"
  tts_speed: 0.9

prompts:
  system_prompt_file: "horror_director.md"

style_presets:
  水墨悬疑: "Chinese ink-wash dark fantasy, muted desaturated tones, misty mountains, cinematic, 8k"
  纸扎阴森: "paper-crafted eerie folk horror, dim candlelight, cold palette, film grain, 8k"
  暗黑道观: "dark Taoist temple interior, incense smoke, chiaroscuro, blood-red accents, 8k"
  佛寺夜寂: "abandoned Buddhist shrine, moonlit, cold blue, silent dread, volumetric light, 8k"
