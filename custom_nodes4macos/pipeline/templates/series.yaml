name: series_drama
content_type: series
description: "连续剧：故事集 → 分集大纲 → 逐集生成（每集独立成片，角色/声音跨集一致）"
stages: [story_ingest, series_orchestrate]
defaults:
  episode_count: 5
  episode_duration_min: 30
  scene_count: 8
  style_preset: "电影叙事"
  flux_steps: 4
  flux_width: 1024
  flux_height: 1024
  flux_guidance: 4.0
  flux_scheduler: "flow_match_euler_discrete"
  flux_steps_auto: true
  ken_burns_preset: "random"
  ken_burns_width: 1080
  ken_burns_height: 1920
  ken_burns_fps: 24
  ken_burns_render_fps: 12
  ken_burns_workers: 3
  ken_burns_audio_cut: true
  ken_burns_silence_noise_db: -30
  ken_burns_silence_min_dur: 0.3
  ken_burns_max_shots: 4
  ken_burns_audio_cut_min_dur: 3.0
  wan_enabled: false
  wan_frames: 41
  wan_steps: 20
  wan_fps: 24
  wan_size: [480, 832]
  wan_max_area: 399360
  wan_seed: 1001
  wan_vary_seed: true
  wan_checkpoint_dir: ""
  assemble_transition: "dissolve"
  assemble_duck_bgm: true
  sfx_map: {}
  subtitle_mode: "auto"
  subtitle_font: "Arial Unicode"
  subtitle_font_size: 20
  subtitle_margin_v: 60
  tts_instructions: "沉稳、有感染力的专业旁白，带情感起伏，语速适中"
  tts_speed: 0.95
  character_registry: []
  checkpoint_every_n_scenes: 5
  consistency_check: true
  cleanup_episode_intermediates: true
prompts:
  system_prompt_file: "series_director.md"
style_presets:
  电影叙事: "cinematic storytelling, warm golden light, shallow depth of field, film grain, 8k"
  纪实风格: "documentary style, natural lighting, handheld camera feel, desaturated, 4k"
  黑白映像: "black and white film, high contrast, dramatic shadows, noir aesthetic, 8k"
  油画质感: "oil painting texture, rich impasto, warm palette, baroque lighting, 8k"
